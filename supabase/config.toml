# JWT is validated inside each function (getClaims / getUser). Kong-level verify_jwt breaks
# many clients using publishable keys + ES256 access tokens (401 before the worker runs).

[functions.guide-intel]
verify_jwt = false

[functions.delete-closed-auth-user]
verify_jwt = false

[functions.weather-proxy]
verify_jwt = false

[functions.share-trip]
verify_jwt = false

[functions.login-with-identifier]
verify_jwt = false

# Public vector tiles for the Public/Private Land overlay — read-only, no auth required.
[functions.land-tiles]
verify_jwt = false

# WS-G scheduled push workers. Invoked by cron (pg_cron + pg_net); they authorize
# via a shared CRON_SECRET header or the service-role bearer, so verify_jwt is off.
[functions.conditions-alerts]
verify_jwt = false

[functions.activity-push]
verify_jwt = false
